<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>自助充值 · 会员中心</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;}
    body{background:linear-gradient(145deg,#f6f9fc 0%,#e6f0f5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;}
    .app-container{width:100%;max-width:460px;margin:0 auto;}
    .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:10001;backdrop-filter:blur(4px);}
    .loading-overlay.hidden{display:none;}
    .loading-spinner{width:50px;height:50px;border:4px solid #e0e8ed;border-top-color:#1e4b63;border-radius:50%;animation:spin 0.8s linear infinite;}
    .loading-text{margin-top:16px;color:#1e4b63;font-weight:500;font-size:14px;}
    .loading-container{display:flex;flex-direction:column;align-items:center;justify-content:center;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .app-title{text-align:center;margin-bottom:16px;}
    .app-title h1{font-size:24px;font-weight:700;color:#0b2b3c;}
    .toast-message{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,75,99,0.95);color:white;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:500;box-shadow:0 8px 20px rgba(0,0,0,0.2);z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px);}
    .toast-message.show{opacity:1;}
    .toast-message.success{background:rgba(39,174,96,0.95);}
    .toast-message.warning{background:rgba(241,196,15,0.95);color:#1e4b63;}
    .confirm-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(4px);}
    .confirm-modal.hidden{display:none;}
    .confirm-content{background:white;border-radius:28px;padding:24px 20px;max-width:360px;width:90%;box-shadow:0 20px 40px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto;position:relative;}
    .confirm-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#7b98a8;}
    .confirm-icon{font-size:48px;text-align:center;margin-bottom:12px;margin-top:8px;}
    .confirm-title{font-size:18px;font-weight:700;color:#1e4b63;text-align:center;margin-bottom:16px;}
    .confirm-warning-text{background:#fff9e6;border-radius:16px;padding:16px;margin-bottom:20px;border-left:4px solid #f0a500;}
    .confirm-warning-text p{font-size:13px;color:#5c4a1e;line-height:1.6;margin-bottom:8px;}
    .confirm-highlight{color:#c0392b;font-weight:600;}
    .confirm-btn{width:100%;padding:14px 16px;font-size:15px;font-weight:600;border:none;border-radius:30px;cursor:pointer;background:#1e4b63;color:white;}
    .confirm-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .arrival-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10002;backdrop-filter:blur(4px);}
    .arrival-modal.hidden{display:none;}
    .arrival-content{background:white;border-radius:28px;padding:30px 24px;max-width:320px;width:90%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);}
    .arrival-icon{font-size:64px;margin-bottom:16px;}
    .arrival-title{font-size:22px;font-weight:700;color:#27ae60;margin-bottom:8px;}
    .arrival-text{font-size:15px;color:#5c7b8c;margin-bottom:20px;}
    .arrival-btn{width:100%;padding:14px;font-size:16px;font-weight:600;border:none;border-radius:30px;cursor:pointer;background:#27ae60;color:white;}
    .lang-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .lang-switch{display:flex;gap:8px;margin-left:auto;}
    .lang-btn{background:rgba(255,255,255,0.7);border:1px solid #bdd3e0;padding:6px 12px;border-radius:30px;font-size:12px;font-weight:500;color:#1e4b63;cursor:pointer;}
    .lang-btn.active{background:#1e4b63;color:white;}
    .admin-link{background:none;border:none;color:#1e4b63;font-size:12px;cursor:pointer;text-decoration:underline;padding:4px 8px;}
    .card{background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-radius:28px;box-shadow:0 15px 30px rgba(0,20,40,0.1);padding:20px 18px;border:1px solid rgba(255,255,255,0.5);}
    .login-avatar{width:56px;height:56px;background:#1e4b63;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:6px auto 20px;color:white;font-size:28px;}
    .input-group{margin-bottom:16px;}
    label{display:block;font-size:13px;font-weight:500;color:#1e4b63;margin-bottom:5px;}
    .input-field{width:100%;padding:12px 16px;font-size:15px;background:white;border:1.5px solid #d7e2e9;border-radius:20px;outline:none;}
    .input-field:focus{border-color:#2f7c9e;}
    .input-field.error{border-color:#c0392b;}
    .password-wrapper{position:relative;}
    .password-wrapper .input-field{padding-right:50px;}
    .toggle-password{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:8px;line-height:0;}
    .eye-icon{width:22px;height:22px;stroke:#999;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .toggle-password:hover .eye-icon{stroke:#1e4b63;}
    .slash-line{stroke:#999;stroke-width:2.5;display:none;}
    .pw-hidden .slash-line{display:block;}
    .captcha-group{display:flex;gap:10px;align-items:center;}
    .captcha-input{flex:1;}
    .captcha-display{background:linear-gradient(135deg,#1e4b63,#2f7c9e);color:white;padding:12px 16px;border-radius:20px;font-size:20px;font-weight:700;letter-spacing:4px;text-align:center;min-width:100px;cursor:pointer;font-family:'Courier New',monospace;}
    .btn{width:100%;padding:14px 16px;font-size:16px;font-weight:600;border:none;border-radius:35px;background:#1e4b63;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-secondary{background:#edf2f7;color:#1e4b63;}
    .error-msg{color:#c0392b;font-size:13px;margin-top:6px;min-height:20px;}
    .user-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .welcome-tag{background:#e2edf5;padding:6px 14px;border-radius:30px;font-size:14px;}
    .logout-btn{background:none;border:none;font-size:18px;color:#4f6f82;cursor:pointer;}
    .balance-card{background:linear-gradient(135deg,#1e4b63 0%,#123b4d 100%);border-radius:24px;padding:18px;color:white;margin:6px 0 18px;}
    .balance-label{font-size:14px;opacity:0.9;margin-bottom:6px;}
    .balance-amount{font-size:38px;font-weight:700;}
    .balance-amount small{font-size:16px;margin-left:4px;}
    h2{font-size:22px;font-weight:600;color:#0b2b3c;margin-bottom:16px;}
    .recharge-options{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 16px;}
    .recharge-item{flex:1 0 calc(33.33% - 10px);min-width:80px;background:white;border-radius:18px;padding:12px 6px;text-align:center;border:1.5px solid #d4e2ec;cursor:pointer;}
    .recharge-item.selected{border:2px solid #1e4b63;background:#f0f9ff;}
    .recharge-amount{font-size:20px;font-weight:700;color:#0b2b3c;}
    .network-section{margin:16px 0 14px;}
    .network-title{font-weight:600;font-size:14px;color:#1e4b63;margin-bottom:10px;}
    .network-buttons{display:flex;gap:12px;}
    .network-btn{flex:1;background:white;border:2px solid #d0e0eb;border-radius:30px;padding:11px 0;font-weight:600;font-size:14px;color:#2c5b73;cursor:pointer;}
    .network-btn.active{background:#1e4b63;color:white;border-color:#1e4b63;}
    .timer-warning{background:linear-gradient(135deg,#fff5e6,#ffe8cc);border-radius:24px;padding:14px 16px;color:#b6560b;font-weight:600;margin-bottom:16px;border-left:5px solid #f90;display:flex;align-items:center;justify-content:space-between;}
    .countdown-timer{font-size:24px;font-weight:700;color:#d35400;background:rgba(255,255,255,0.5);padding:4px 12px;border-radius:30px;font-family:'Courier New',monospace;}
    .order-id-section{background:#eef3f8;border-radius:20px;padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;}
    .address-card{background:#f4f9ff;border-radius:22px;padding:16px;margin:16px 0;border:2px dashed #1e4b63;}
    .address-header{display:flex;justify-content:space-between;margin-bottom:10px;}
    .address-value-large{font-size:14px;font-weight:600;color:#0b2b3c;font-family:'Courier New',monospace;word-break:break-all;background:white;padding:12px 14px;border-radius:16px;margin-bottom:12px;border:1px solid #cbdde8;}
    .copy-btn{background:#1e4b63;color:white;border:none;border-radius:25px;padding:10px 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
    .copy-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .tips-container-bottom{background:linear-gradient(135deg,#f0f7ff,#e6f0fa);border-radius:20px;padding:16px;margin-top:20px;}
    .tip-item{display:flex;gap:10px;margin-bottom:12px;font-size:13px;color:#1e4b63;}
    .tip-icon{width:20px;height:20px;background:#1e4b63;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;flex-shrink:0;}
    .qr-placeholder{background:#fff;padding:18px 10px;border-radius:26px;margin:16px 0;text-align:center;}
    .qr-code-container{width:150px;height:150px;margin:0 auto;display:flex;align-items:center;justify-content:center;}
    .qr-code-container img{max-width:100%;max-height:100%;object-fit:contain;}
    .qr-code-sim{width:150px;height:150px;margin:0 auto;background:repeating-linear-gradient(45deg,#000,#000 6px,#fff 6px,#fff 12px);border-radius:14px;border:3px solid #1e4b63;}
    .hidden{display:none !important;}
    .history-list{list-style:none;max-height:200px;overflow-y:auto;}
    .history-item{background:rgba(255,255,255,0.6);padding:12px 14px;border-radius:16px;margin-bottom:6px;font-size:13px;display:flex;justify-content:space-between;}
    .history-amount{font-weight:700;color:#1c6d4c;}
    .empty-history{text-align:center;color:#7b98a8;padding:18px 0;}
    .custom-input-wrapper{display:flex;align-items:center;background:white;border-radius:50px;padding:3px 3px 3px 16px;border:1.5px solid #d4e2ec;margin:10px 0;}
    .custom-amount{flex:1;border:none;padding:14px 6px;font-size:16px;outline:none;background:transparent;}
    .amount-hint{font-size:12px;color:#7b98a8;margin:4px 0 0 10px;}
    .action-buttons{display:flex;gap:12px;margin-top:10px;}
    .action-buttons .btn{flex:1;}
    .admin-panel{max-height:500px;overflow-y:auto;}
    .section-title{font-size:16px;font-weight:600;color:#1e4b63;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid #d0e0eb;}
    .section-title:first-child{margin-top:0;}
    .account-item{background:#f4f9ff;padding:10px 14px;border-radius:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .account-name{font-weight:600;color:#0b2b3c;}
    .account-balance{font-size:13px;color:#1c6d4c;font-weight:600;margin-top:2px;}
    .delete-btn{background:none;border:none;color:#c0392b;cursor:pointer;font-size:16px;}
    .edit-btn{background:none;border:none;color:#1e4b63;cursor:pointer;font-size:14px;margin-right:8px;}
    .address-item{background:#f4f9ff;padding:10px 14px;border-radius:16px;margin-bottom:8px;}
    .address-network{font-size:12px;color:#5c7b8c;margin-bottom:4px;}
    .address-full{font-size:12px;font-family:'Courier New',monospace;word-break:break-all;margin-bottom:8px;}
    .address-actions{display:flex;gap:8px;}
    .upload-qr-btn{background:#1e4b63;color:white;border:none;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
    .add-address-form{display:flex;gap:8px;margin-bottom:16px;}
    .add-address-form select{flex:1;padding:10px;border-radius:16px;border:1.5px solid #d0e0eb;}
    .add-address-form input{flex:2;padding:10px;border-radius:16px;border:1.5px solid #d0e0eb;}
    .admin-history-item{background:#f4f9ff;padding:10px 14px;border-radius:16px;margin-bottom:8px;font-size:13px;}
    .admin-history-header{display:flex;justify-content:space-between;margin-bottom:4px;}
    .admin-history-user{font-weight:600;color:#1e4b63;}
    .admin-history-amount{font-weight:700;color:#1c6d4c;}
    .action-cell{display:flex;gap:5px;align-items:center;}
    .status-badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;}
    .status-badge.pending{background:#fef3c7;color:#b45309;}
    .status-badge.success{background:#d1fae5;color:#047857;}
    @media (max-width:480px){body{padding:8px;}.card{padding:16px 14px;}.balance-amount{font-size:34px;}}
  </style>
</head>
<body>
<div class="app-container">
  <div id="loadingOverlay" class="loading-overlay hidden"><div class="loading-container"><div class="loading-spinner"></div><div class="loading-text">加载中...</div></div></div>
  <div id="toast" class="toast-message"></div>
  <div id="arrivalModal" class="arrival-modal hidden">
    <div class="arrival-content"><div class="arrival-icon">🎉</div><div class="arrival-title" id="arrivalTitle">充值已到账</div><div class="arrival-text" id="arrivalText">您的余额已更新</div><button class="arrival-btn" id="arrivalOkBtn">返回首页</button></div>
  </div>
  <div id="confirmModal" class="confirm-modal hidden">
    <div class="confirm-content">
      <button class="confirm-close" onclick="cmClose()">✕</button>
      <div class="confirm-icon">⚠️</div><div class="confirm-title" id="confirmModalTitle">重要提醒</div>
      <div class="confirm-warning-text">
        <p id="confirmText1">即将跳转支付页面</p><p id="confirmText2">请核对地址和网络</p><p id="confirmText3">创建新的订单</p><p id="confirmText4"></p><p id="confirmText5"></p>
      </div>
      <button class="confirm-btn" id="confirmOkBtn" disabled>确认 (3)</button>
    </div>
  </div>
  <div class="lang-bar">
    <button class="admin-link" id="adminLink" style="display:none;">管理</button>
    <div class="lang-switch"><button class="lang-btn active" data-lang="zh">中文</button><button class="lang-btn" data-lang="en">English</button></div>
  </div>
  <div class="app-title"><h1 id="appTitle">自助充值中心</h1></div>

  <div id="loginPanel" class="card">
    <div class="login-avatar"><span>🔐</span></div>
    <div class="input-group"><label id="lblAccount">账户</label><input type="text" id="loginUsername" class="input-field"></div>
    <div class="input-group"><label id="lblPassword">密码</label><div class="password-wrapper"><input type="password" id="loginPassword" class="input-field"><button type="button" class="toggle-password pw-hidden" onclick="togglePw(this)"><svg class="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line class="slash-line" x1="2" y1="2" x2="22" y2="22"/></svg></button></div></div>
    <div class="input-group"><label id="lblCaptcha">验证码</label><div class="captcha-group"><input type="text" id="loginCaptcha" class="input-field" maxlength="4"><div class="captcha-display" id="captchaDisplay">A3B8</div></div></div>
    <div id="loginError" class="error-msg"></div>
    <button id="loginBtn" class="btn">登录</button>
  </div>

  <div id="rechargePanel" class="card hidden">
    <div class="user-header"><span class="welcome-tag" id="welcomeUser">-</span><button id="logoutBtn" class="logout-btn">退出</button></div>
    <div class="balance-card"><div id="balanceLabel">余额</div><div class="balance-amount"><span id="balanceValue">0.00</span><small>$</small></div></div>
    <h2 id="rechargeTitle">快速充值</h2>
    <div class="recharge-options" id="rechargeOptionsContainer"></div>
    <div class="custom-input-wrapper"><span>$</span><input type="number" id="customAmountInput" class="custom-amount" min="20" max="50000" step="0.01"></div>
    <div id="amountHint">限额 20-50,000</div>
    <div class="network-section"><div id="networkTitle">选择网络 *</div><div class="network-buttons"><button class="network-btn" data-network="TRC20">USDT-TRC20</button><button class="network-btn" data-network="ERC20">USDT-ERC20</button></div></div>
    <div id="rechargeError" class="error-msg"></div>
    <div class="action-buttons"><button id="gotoConfirmBtn" class="btn">提交</button><button id="resetFormBtn" class="btn btn-secondary">重置</button></div>
    <div style="margin-top:20px;"><div id="historyTitle">记录</div><ul id="historyList" class="history-list"><li class="empty-history">暂无</li></ul></div>
  </div>

  <div id="confirmPanel" class="card hidden">
    <div style="display:flex;align-items:center;margin-bottom:14px;"><button id="backToRechargeBtn" style="background:none;border:none;font-size:22px;cursor:pointer;">←</button><h2 id="confirmPageTitle">确认充值</h2></div>
    <div class="order-id-section"><span id="orderIdLabel">订单号</span><span id="orderIdDisplay">-</span></div>
    <div class="timer-warning"><span id="timeLimitMsg">剩余时间</span><span class="countdown-timer" id="countdownDisplay">15:00</span></div>
    <div style="background:#eef3f8;border-radius:20px;padding:14px;"><span id="orderInfo">金额: $0</span></div>
    <div class="address-card"><div class="address-header"><span id="rechargeAddressLabel">充值地址</span><span id="networkTypeLabel">网络</span></div><div class="address-value-large" id="currentAddressDisplay">-</div><button class="copy-btn" id="copyAddressBtn" disabled>复制地址</button></div>
    <div class="qr-placeholder"><div id="qrCodeDisplay" class="qr-code-container"><div class="qr-code-sim"></div></div><p id="scanTip">请扫描二维码</p></div>
    <div class="tips-container-bottom">
      <div class="tip-item"><div class="tip-icon">1</div><div id="tip1"></div></div>
      <div class="tip-item"><div class="tip-icon">2</div><div id="tip2"></div></div>
      <div class="tip-item"><div class="tip-icon">3</div><div id="tip3"></div></div>
    </div>
  </div>

  <div id="adminPanel" class="card hidden">
    <div style="display:flex;align-items:center;margin-bottom:14px;"><button id="backFromAdminBtn" style="background:none;border:none;font-size:22px;cursor:pointer;">←</button><h2 id="adminPageTitle">管理面板</h2></div>
    <div class="admin-panel">
      <div class="section-title" id="accountManageTitle">账户管理</div>
      <div style="display:flex;gap:10px;margin-bottom:16px;"><input type="text" id="newUsername" class="input-field" placeholder="用户名" style="flex:2;"><div class="password-wrapper" style="flex:2;"><input type="password" id="newPassword" class="input-field" placeholder="密码"><button type="button" class="toggle-password pw-hidden" onclick="togglePw(this)"><svg class="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line class="slash-line" x1="2" y1="2" x2="22" y2="22"/></svg></button></div><button class="btn" id="addAccountBtn" style="flex:1;padding:12px;">添加</button></div>
      <div id="accountList"></div>
      <div class="section-title" id="addressManageTitle">地址管理</div>
      <div class="add-address-form"><select id="newAddressNetwork"><option value="TRC20">USDT-TRC20</option><option value="ERC20">USDT-ERC20</option></select><input type="text" id="newAddressValue" class="input-field" placeholder="输入新地址"><button class="btn" id="addAddressBtn" style="flex:1;padding:10px;">添加</button></div>
      <div id="addressManager"></div>
      <div class="section-title" id="orderManageTitle">订单管理</div>
      <div id="adminOrderList"></div>
    </div>
  </div>
</div>

<script>
function togglePw(btn){const i=btn.parentElement.querySelector('input');i.type=i.type==='password'?'text':'password';btn.classList.toggle('pw-hidden',i.type==='password');}
function cmClose(){document.getElementById('confirmModal').classList.add('hidden');if(window._ct)clearInterval(window._ct);}
